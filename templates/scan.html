{% extends "base.html" %}
{% block title %}Scan a Cheque{% endblock %}
{% block content %}
<h2>Upload Cheque Image</h2>
<p class="hint">Make sure the full cheque is visible, well-lit, and in focus — especially the
MICR line at the bottom and the signature area.</p>

<form method="POST" class="form-card" enctype="multipart/form-data">
    <label>Cheque Photo</label>
    <input type="file" name="cheque_image" accept=".png,.jpg,.jpeg" required>

    <div class="form-actions">
        <a class="btn btn-secondary" href="{{ url_for('home') }}">&larr; Back</a>
        <button type="submit" class="btn btn-primary">Scan & Continue &rarr;</button>
    </div>
</form>
{% endblock %}
